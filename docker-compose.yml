services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: secondbrain-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379

    volumes:
      - shared_data:/app/secondbrain/data

    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started

    restart: unless-stopped

    networks:
      - secondbrain-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: secondbrain-worker

    command: python -m secondbrain.queues.worker

    env_file:
      - .env

    environment:
      MONGODB_URI: mongodb://mongodb:27017
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379

    volumes:
      - shared_data:/app/secondbrain/data

    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started

    restart: unless-stopped

    networks:
      - secondbrain-network

  mongodb:
    image: mongo:8

    container_name: secondbrain-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

    networks:
      - secondbrain-network

  redis:
    image: redis:8-alpine

    container_name: secondbrain-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    networks:
      - secondbrain-network

  qdrant:
    image: qdrant/qdrant:latest

    container_name: secondbrain-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    restart: unless-stopped

    networks:
      - secondbrain-network

networks:
  secondbrain-network:
    driver: bridge

volumes:
  mongodb_data:
  qdrant_data:
  shared_data: